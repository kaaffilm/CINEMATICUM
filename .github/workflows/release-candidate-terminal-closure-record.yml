name: release-candidate-terminal-closure-record

on:
  pull_request:
    paths:
      - "CINEMATICUM_RELEASE_CANDIDATE_TERMINAL_CLOSURE_RECORD.json"
      - "CINEMATICUM_RELEASE_CANDIDATE_TERMINAL_CLOSURE_RECORD_LAW.json"
      - "CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_TERMINAL_CLOSURE_RECORD/**"
      - "CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_TERMINAL_CLOSURE_RECORD_STATUS.json"
      - "scripts/verify-release-candidate-terminal-closure-record.sh"
      - "tests/test_release_candidate_terminal_closure_record.py"
      - "CINEMATICUM_OBJECT_REGISTRY.json"
      - "CINEMATICUM_MASTER_VERIFICATION_MANIFEST.json"
      - "scripts/verify-all.sh"
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify release candidate terminal closure record
        run: bash scripts/verify-release-candidate-terminal-closure-record.sh
