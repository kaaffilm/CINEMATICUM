name: state-transition-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  state-transition-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify state transition gate
        run: bash scripts/verify-state-transition-gate.sh
      - name: Run state transition gate tests
        run: python3 -m unittest tests/test_state_transition_gate.py
