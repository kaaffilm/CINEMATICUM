name: authority-precedence-lattice

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  authority-precedence-lattice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify authority precedence lattice
        run: bash scripts/verify-authority-precedence-lattice.sh
      - name: Run authority precedence lattice tests
        run: python3 -m unittest tests/test_authority_precedence_lattice.py
