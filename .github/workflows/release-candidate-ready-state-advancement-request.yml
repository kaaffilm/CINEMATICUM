name: release-candidate-ready-state-advancement-request

on:
  push:
    paths:
      - "CINEMATICUM_RELEASE_CANDIDATE_READY_STATE_ADVANCEMENT_REQUEST.json"
      - "CINEMATICUM_RELEASE_CANDIDATE_READY_STATE_ADVANCEMENT_REQUEST_LAW.json"
      - "CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_READY_STATE_ADVANCEMENT_REQUEST/**"
      - "CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_READY_STATE_ADVANCEMENT_REQUEST_STATUS.json"
      - "scripts/verify-release-candidate-ready-state-advancement-request.sh"
      - "tests/test_release_candidate_ready_state_advancement_request.py"
      - ".github/workflows/release-candidate-ready-state-advancement-request.yml"
  pull_request:
    paths:
      - "CINEMATICUM_RELEASE_CANDIDATE_READY_STATE_ADVANCEMENT_REQUEST.json"
      - "CINEMATICUM_RELEASE_CANDIDATE_READY_STATE_ADVANCEMENT_REQUEST_LAW.json"
      - "CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_READY_STATE_ADVANCEMENT_REQUEST/**"
      - "CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_READY_STATE_ADVANCEMENT_REQUEST_STATUS.json"
      - "scripts/verify-release-candidate-ready-state-advancement-request.sh"
      - "tests/test_release_candidate_ready_state_advancement_request.py"
      - ".github/workflows/release-candidate-ready-state-advancement-request.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: bash scripts/verify-release-candidate-ready-state-advancement-request.sh
      - run: python3 -m unittest tests/test_release_candidate_ready_state_advancement_request.py
