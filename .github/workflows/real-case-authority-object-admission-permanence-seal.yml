name: CINEMATICUM Real Case Authority Object Admission Permanence Seal

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-real-case-authority-object-admission-permanence-seal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify real case authority object admission permanence seal
        run: bash scripts/verify-real-case-authority-object-admission-permanence-seal.sh
      - name: Unit test real case authority object admission permanence seal
        run: python3 -m unittest tests/test_real_case_authority_object_admission_permanence_seal.py
      - name: Verify object registry freshness
        run: bash scripts/verify-object-registry-fresh.sh
