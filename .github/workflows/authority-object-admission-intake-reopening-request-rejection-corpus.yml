name: authority-object-admission-intake-reopening-request-rejection-corpus

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  authority-object-admission-intake-reopening-request-rejection-corpus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify authority object admission intake reopening request rejection corpus
        run: bash scripts/verify-authority-object-admission-intake-reopening-request-rejection-corpus.sh
      - name: Run authority object admission intake reopening request rejection corpus tests
        run: python3 -m unittest tests/test_authority_object_admission_intake_reopening_request_rejection_corpus.py
