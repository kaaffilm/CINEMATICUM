name: release-candidate-evidence-bundle

on:
  push:
    paths:
      - 'CINEMATICUM_RELEASE_CANDIDATE_EVIDENCE_BUNDLE.json'
      - 'CINEMATICUM_RELEASE_CANDIDATE_EVIDENCE_BUNDLE_LAW.json'
      - 'CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_EVIDENCE_BUNDLE/**'
      - 'CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_EVIDENCE_BUNDLE_STATUS.json'
      - 'scripts/verify-release-candidate-evidence-bundle.sh'
      - 'tests/test_release_candidate_evidence_bundle.py'
      - '.github/workflows/release-candidate-evidence-bundle.yml'
  pull_request:
    paths:
      - 'CINEMATICUM_RELEASE_CANDIDATE_EVIDENCE_BUNDLE.json'
      - 'CINEMATICUM_RELEASE_CANDIDATE_EVIDENCE_BUNDLE_LAW.json'
      - 'CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_EVIDENCE_BUNDLE/**'
      - 'CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_EVIDENCE_BUNDLE_STATUS.json'
      - 'scripts/verify-release-candidate-evidence-bundle.sh'
      - 'tests/test_release_candidate_evidence_bundle.py'
      - '.github/workflows/release-candidate-evidence-bundle.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m unittest tests/test_release_candidate_evidence_bundle.py
      - run: bash scripts/verify-release-candidate-evidence-bundle.sh
