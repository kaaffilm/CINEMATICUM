name: current-state-index

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  current-state-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify current state index
        run: bash scripts/verify-current-state-index.sh
      - name: Run current state index tests
        run: python3 -m unittest tests/test_current_state_index.py
