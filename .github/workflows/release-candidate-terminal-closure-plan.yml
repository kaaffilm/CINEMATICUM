name: release-candidate-terminal-closure-plan

on:
  push:
    paths:
      - 'CINEMATICUM_RELEASE_CANDIDATE_TERMINAL_CLOSURE_PLAN.json'
      - 'CINEMATICUM_RELEASE_CANDIDATE_TERMINAL_CLOSURE_PLAN_LAW.json'
      - 'CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_TERMINAL_CLOSURE_PLAN/**'
      - 'CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_TERMINAL_CLOSURE_PLAN_STATUS.json'
      - 'scripts/verify-release-candidate-terminal-closure-plan.sh'
      - 'tests/test_release_candidate_terminal_closure_plan.py'
      - '.github/workflows/release-candidate-terminal-closure-plan.yml'
  pull_request:
    paths:
      - 'CINEMATICUM_RELEASE_CANDIDATE_TERMINAL_CLOSURE_PLAN.json'
      - 'CINEMATICUM_RELEASE_CANDIDATE_TERMINAL_CLOSURE_PLAN_LAW.json'
      - 'CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_TERMINAL_CLOSURE_PLAN/**'
      - 'CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_TERMINAL_CLOSURE_PLAN_STATUS.json'
      - 'scripts/verify-release-candidate-terminal-closure-plan.sh'
      - 'tests/test_release_candidate_terminal_closure_plan.py'
      - '.github/workflows/release-candidate-terminal-closure-plan.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m unittest tests/test_release_candidate_terminal_closure_plan.py
      - run: bash scripts/verify-release-candidate-terminal-closure-plan.sh
