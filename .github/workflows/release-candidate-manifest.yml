name: release-candidate-manifest

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python3 -m unittest tests/test_release_candidate_manifest.py
      - run: bash scripts/verify-release-candidate-manifest.sh
      - run: python3 scripts/regenerate-object-registry.py --check
