name: state-advancement-execution-record

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify state advancement execution record
        run: |
          bash scripts/verify-state-advancement-execution-record.sh
          python3 -m unittest tests/test_state_advancement_execution_record.py
