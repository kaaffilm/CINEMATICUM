name: public-perimeter-sentinel

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-perimeter-sentinel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify public perimeter sentinel
        run: bash scripts/verify-public-perimeter-sentinel.sh
      - name: Run public perimeter sentinel tests
        run: python3 -m unittest tests/test_public_perimeter_sentinel.py
