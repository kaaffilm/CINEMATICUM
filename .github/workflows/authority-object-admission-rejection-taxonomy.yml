name: authority-object-admission-rejection-taxonomy

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  authority-object-admission-rejection-taxonomy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify authority object admission rejection taxonomy
        run: bash scripts/verify-authority-object-admission-rejection-taxonomy.sh
      - name: Run authority object admission rejection taxonomy tests
        run: python3 -m unittest tests/test_authority_object_admission_rejection_taxonomy.py
