name: authority-object-admission-enforcement-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  authority-object-admission-enforcement-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify authority object admission enforcement gate
        run: bash scripts/verify-authority-object-admission-enforcement-gate.sh
      - name: Run authority object admission enforcement gate tests
        run: python3 -m unittest tests/test_authority_object_admission_enforcement_gate.py
