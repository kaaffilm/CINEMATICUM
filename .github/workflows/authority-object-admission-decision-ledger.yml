name: authority-object-admission-decision-ledger

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  authority-object-admission-decision-ledger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify authority object admission decision ledger
        run: bash scripts/verify-authority-object-admission-decision-ledger.sh
      - name: Run authority object admission decision ledger tests
        run: python3 -m unittest tests/test_authority_object_admission_decision_ledger.py
