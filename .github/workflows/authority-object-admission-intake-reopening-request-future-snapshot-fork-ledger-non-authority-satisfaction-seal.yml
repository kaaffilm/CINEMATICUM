name: authority-object-admission-intake-reopening-request-future-snapshot-fork-ledger-non-authority-satisfaction-seal

on:
  push:
  pull_request:

jobs:
  verify-non-authority-satisfaction-seal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: bash scripts/verify-authority-object-admission-intake-reopening-request-future-snapshot-fork-ledger-non-authority-satisfaction-seal.sh
      - run: python3 -m unittest tests/test_authority_object_admission_intake_reopening_request_future_snapshot_fork_ledger_non_authority_satisfaction_seal.py
      - run: python3 scripts/regenerate-object-registry.py --check
