name: authority-object-admission-request-schema

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  authority-object-admission-request-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify authority object admission request schema
        run: bash scripts/verify-authority-object-admission-request-schema.sh
      - name: Run authority object admission request schema tests
        run: python3 -m unittest tests/test_authority_object_admission_request_schema.py
