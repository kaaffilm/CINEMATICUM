name: real-case-authority-object-admission-request-rejection-corpus

on:
pull_request:
push:
branches:
- main

jobs:
real-case-authority-object-admission-request-rejection-corpus:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- uses: actions/setup-python@v5
with:
python-version: "3.x"
- run: bash scripts/verify-real-case-authority-object-admission-request-rejection-corpus.sh
- run: python3 -m unittest tests/test_real_case_authority_object_admission_request_rejection_corpus.py
- run: bash scripts/verify-object-registry-fresh.sh
