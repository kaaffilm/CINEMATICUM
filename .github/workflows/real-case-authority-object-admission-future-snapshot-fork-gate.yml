name: real-case-authority-object-admission-future-snapshot-fork-gate

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify real-case authority object admission future snapshot fork gate
        run: |
          bash scripts/verify-real-case-authority-object-admission-future-snapshot-fork-gate.sh
          python3 -m unittest tests/test_real_case_authority_object_admission_future_snapshot_fork_gate.py
