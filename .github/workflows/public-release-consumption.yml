name: public-release-consumption

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-public-release-consumption:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify public release consumption receipt
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/verify-public-release-consumption-receipt.mjs
