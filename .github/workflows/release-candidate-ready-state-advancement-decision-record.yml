name: CINEMATICUM Release Candidate Ready State Advancement Decision Record

on:
  push:
    paths:
      - 'CINEMATICUM_RELEASE_CANDIDATE_READY_STATE_ADVANCEMENT_DECISION_RECORD.json'
      - 'CINEMATICUM_RELEASE_CANDIDATE_READY_STATE_ADVANCEMENT_DECISION_RECORD_LAW.json'
      - 'CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_READY_STATE_ADVANCEMENT_DECISION_RECORD/**'
      - 'CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_READY_STATE_ADVANCEMENT_DECISION_RECORD_STATUS.json'
      - 'scripts/verify-release-candidate-ready-state-advancement-decision-record.sh'
      - 'tests/test_release_candidate_ready_state_advancement_decision_record.py'
      - '.github/workflows/release-candidate-ready-state-advancement-decision-record.yml'
  pull_request:
    paths:
      - 'CINEMATICUM_RELEASE_CANDIDATE_READY_STATE_ADVANCEMENT_DECISION_RECORD.json'
      - 'CINEMATICUM_RELEASE_CANDIDATE_READY_STATE_ADVANCEMENT_DECISION_RECORD_LAW.json'
      - 'CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_READY_STATE_ADVANCEMENT_DECISION_RECORD/**'
      - 'CASES/CASE_001_THE_LAST_RENDER/RELEASE_CANDIDATE_READY_STATE_ADVANCEMENT_DECISION_RECORD_STATUS.json'
      - 'scripts/verify-release-candidate-ready-state-advancement-decision-record.sh'
      - 'tests/test_release_candidate_ready_state_advancement_decision_record.py'
      - '.github/workflows/release-candidate-ready-state-advancement-decision-record.yml'

jobs:
  verify-release-candidate-ready-state-advancement-decision-record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify decision record
        run: bash scripts/verify-release-candidate-ready-state-advancement-decision-record.sh
      - name: Unit test decision record
        run: python3 -m unittest tests/test_release_candidate_ready_state_advancement_decision_record.py
