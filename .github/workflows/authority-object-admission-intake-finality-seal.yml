name: authority-object-admission-intake-finality-seal

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  authority-object-admission-intake-finality-seal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify authority object admission intake finality seal
        run: bash scripts/verify-authority-object-admission-intake-finality-seal.sh
      - name: Run authority object admission intake finality seal tests
        run: python3 -m unittest tests/test_authority_object_admission_intake_finality_seal.py
