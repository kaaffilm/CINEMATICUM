name: public-inspection-negative-proof

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-inspection-negative-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify public inspection negative proof
        run: bash scripts/verify-public-inspection-negative-proof.sh
      - name: Run public inspection negative proof tests
        run: python3 -m unittest tests/test_public_inspection_negative_proof.py
