name: real-case-authority-object-slot-index

on:
  pull_request:
  push:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: bash scripts/verify-real-case-authority-object-slot-index.sh
      - run: python3 -m unittest tests/test_real_case_authority_object_slot_index.py
