name: authority-object-admission-intake-rejection-ledger

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  authority-object-admission-intake-rejection-ledger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify authority object admission intake rejection ledger
        run: bash scripts/verify-authority-object-admission-intake-rejection-ledger.sh
      - name: Run authority object admission intake rejection ledger tests
        run: python3 -m unittest tests/test_authority_object_admission_intake_rejection_ledger.py
