name: master-verification-manifest-closure

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  master-verification-manifest-closure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify master verification manifest closure
        run: bash scripts/verify-master-verification-manifest-closure.sh
      - name: Run master verification manifest closure tests
        run: python3 -m unittest tests/test_master_verification_manifest_closure.py
