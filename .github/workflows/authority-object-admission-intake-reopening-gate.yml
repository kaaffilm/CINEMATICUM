name: authority-object-admission-intake-reopening-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  authority-object-admission-intake-reopening-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify authority object admission intake reopening gate
        run: bash scripts/verify-authority-object-admission-intake-reopening-gate.sh
      - name: Run authority object admission intake reopening gate tests
        run: python3 -m unittest tests/test_authority_object_admission_intake_reopening_gate.py
