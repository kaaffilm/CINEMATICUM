name: CINEMATICUM real case authority object admission future continuity seal

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-real-case-authority-object-admission-future-continuity-seal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: bash scripts/verify-real-case-authority-object-admission-future-continuity-seal.sh
      - run: python3 -m unittest tests/test_real_case_authority_object_admission_future_continuity_seal.py
      - run: python3 -m unittest tests/test_master_verification_manifest_closure.py
      - run: bash scripts/verify-object-registry-fresh.sh
