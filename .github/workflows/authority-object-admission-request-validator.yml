name: authority-object-admission-request-validator

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  authority-object-admission-request-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify authority object admission request validator
        run: bash scripts/verify-authority-object-admission-request-validator.sh
      - name: Run authority object admission request validator tests
        run: python3 -m unittest tests/test_authority_object_admission_request_validator.py
