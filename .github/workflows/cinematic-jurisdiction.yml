name: cinematic-jurisdiction

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  cinematic-jurisdiction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify CINEMATICUM jurisdiction
        run: |
          RECEIPT_PATH="$RUNNER_TEMP/CINEMATICUM_CINEMATIC_JURISDICTION_RECEIPT.json" \
            bash scripts/verify-cinematic-jurisdiction.sh

      - name: Run jurisdiction tests
        run: python -m unittest tests/test_cinematic_jurisdiction.py

      - name: Assert PR1 contains no engine/model/media body
        run: |
          test ! -d engine
          test ! -d workflows
          test ! -d models.lock
          test ! -d models
          test ! -d renders
          test ! -d frames
          test ! -d exports
          if find . -type f \( \
            -name '*.mp4' -o -name '*.mov' -o -name '*.mkv' -o -name '*.webm' -o \
            -name '*.wav' -o -name '*.flac' -o -name '*.safetensors' -o -name '*.ckpt' -o \
            -name '*.pth' -o -name '*.gguf' \
          \) | grep .; then
            echo "forbidden heavy media/model artifact found"
            exit 1
          fi

      - name: Assert committed source purity
        run: |
          if git ls-files | grep -E '(^|/)__pycache__/|\.pyc$|\.pyo$'; then
            echo "python cache artifact committed"
            exit 1
          fi
          if git ls-files | grep -E '\.(mp4|mov|mkv|webm|wav|flac|safetensors|ckpt|pth|gguf)$'; then
            echo "heavy media/model artifact committed"
            exit 1
          fi
