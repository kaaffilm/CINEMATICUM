name: authority-object-instantiation-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  authority-object-instantiation-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify authority object instantiation gate
        run: bash scripts/verify-authority-object-instantiation-gate.sh
      - name: Run authority object instantiation gate tests
        run: python3 -m unittest tests/test_authority_object_instantiation_gate.py
