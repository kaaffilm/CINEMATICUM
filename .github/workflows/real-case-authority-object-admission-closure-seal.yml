name: real-case-authority-object-admission-closure-seal

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-real-case-authority-object-admission-closure-seal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify real case authority object admission closure seal
        run: bash scripts/verify-real-case-authority-object-admission-closure-seal.sh
      - name: Unit test real case authority object admission closure seal
        run: python3 -m unittest tests/test_real_case_authority_object_admission_closure_seal.py
      - name: Verify object registry freshness
        run: bash scripts/verify-object-registry-fresh.sh
