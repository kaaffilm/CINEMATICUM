name: authority-object-admission-closure-seal

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  authority-object-admission-closure-seal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify authority object admission closure seal
        run: bash scripts/verify-authority-object-admission-closure-seal.sh
      - name: Run authority object admission closure seal tests
        run: python3 -m unittest tests/test_authority_object_admission_closure_seal.py
