name: real-case-authority-object-admission-request-schema

on:
  pull_request:
    paths:
      - "CINEMATICUM_REAL_CASE_AUTHORITY_OBJECT_ADMISSION_REQUEST_SCHEMA*.json"
      - "CASES/CASE_001_THE_LAST_RENDER/REAL_CASE_AUTHORITY_OBJECT_ADMISSION_REQUEST_SCHEMA_STATUS.json"
      - "REAL_CASE_AUTHORITY_OBJECT_ADMISSION_REQUEST_SCHEMA.md"
      - "scripts/verify-real-case-authority-object-admission-request-schema.sh"
      - "tests/test_real_case_authority_object_admission_request_schema.py"
      - "scripts/verify-all.sh"
      - "CINEMATICUM_MASTER_VERIFICATION_MANIFEST.json"
      - "CINEMATICUM_OBJECT_REGISTRY.json"
      - ".github/workflows/real-case-authority-object-admission-request-schema.yml"
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify real case authority object admission request schema
        run: |
          bash scripts/verify-real-case-authority-object-admission-request-schema.sh
          python3 -m unittest tests/test_real_case_authority_object_admission_request_schema.py
