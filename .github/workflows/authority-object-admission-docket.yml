name: authority-object-admission-docket

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  authority-object-admission-docket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify authority object admission docket
        run: bash scripts/verify-authority-object-admission-docket.sh
      - name: Run authority object admission docket tests
        run: python3 -m unittest tests/test_authority_object_admission_docket.py
