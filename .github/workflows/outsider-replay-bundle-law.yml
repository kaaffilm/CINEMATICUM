name: outsider-replay-bundle-law

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  outsider-replay-bundle-law:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify outsider replay bundle law
        run: bash scripts/verify-outsider-replay-bundle-law.sh
      - name: Run outsider replay bundle law tests
        run: python3 -m unittest tests/test_outsider_replay_bundle_law.py
