name: real-case-authority-object-admission-enforcement-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-real-case-authority-object-admission-enforcement-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify real case authority object admission enforcement gate
        run: bash scripts/verify-real-case-authority-object-admission-enforcement-gate.sh
      - name: Unit test real case authority object admission enforcement gate
        run: python3 -m unittest tests/test_real_case_authority_object_admission_enforcement_gate.py
      - name: Verify object registry freshness
        run: bash scripts/verify-object-registry-fresh.sh
