name: object-registry-freshness

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  object-registry-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify object registry freshness
        run: bash scripts/verify-object-registry-fresh.sh
      - name: Run object registry freshness tests
        run: python3 -m unittest tests/test_object_registry_freshness.py
