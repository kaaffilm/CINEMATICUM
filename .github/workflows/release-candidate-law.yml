name: release-candidate-law

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-candidate-law:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify release candidate law
        run: bash scripts/verify-release-candidate-law.sh
      - name: Run release candidate law tests
        run: python3 -m unittest tests/test_release_candidate_law.py
