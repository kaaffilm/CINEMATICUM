name: public-auditor-runner

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  verify-public-auditor-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify standalone public auditor runner
        run: node scripts/verify-public-auditor-runner.mjs
